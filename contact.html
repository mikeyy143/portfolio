<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Mohammad Azam</title>
    <meta name="description" content="Contact Mohammad Azam for project collaborations and work opportunities.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Outfit:wght@300;400;500;600;700&family=Space+Grotesk:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="contact-page">
    <div class="grain-overlay" aria-hidden="true"></div>
    <div class="custom-cursor" id="custom-cursor" aria-hidden="true"></div>

    <main class="contact-shell" style="background-color: black;">
        <section class="contact-form-panel">
            <a href="index.html" class="contact-back-link social-rise-link">&larr; Back to Portfolio</a>
            <h1 class="contact-title">Get In Touch.</h1>
            <p class="contact-copy">Share your name, email, and message. Name and email are required, and I will get back to you as soon as possible.</p>

            <form class="contact-form" id="contact-form">
                <input type="hidden" id="from_name" name="from_name">
                <input type="hidden" id="from_email" name="from_email">
                <input type="hidden" id="reply_to" name="reply_to">

                <div class="form-field">
                    <label for="name">Name *</label>
                    <input type="text" id="name" name="name" placeholder="Your full name" required>
                </div>

                <div class="form-field">
                    <label for="email">Email *</label>
                    <input type="email" id="email" name="email" placeholder="your.email@example.com" required>
                </div>

                <div class="form-field">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" placeholder="Tell me what you want to build..."></textarea>
                </div>

                <button type="submit" class="btn-primary large contact-submit">Send Message &rarr;</button>
                <p class="contact-status" id="contact-status" aria-live="polite"></p>
            </form>

            <div class="contact-social">
                <a class="social-rise-link" href="https://www.linkedin.com/in/mikeyazam/" target="_blank" rel="noreferrer">GitHub</a>
                <a class="social-rise-link" href="https://www.linkedin.com/" target="_blank" rel="noreferrer">LinkedIn</a>
                <a class="social-rise-link" href="https://x.com/Mikey157874" target="_blank" rel="noreferrer">Twitter</a>
            </div>
        </section>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script src="contact.js"></script>
</body>
</html>
